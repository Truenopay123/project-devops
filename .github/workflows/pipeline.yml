name: project-devops Pipeline

on:
  push:
    branches: [main, master]

jobs:

  # ── 1. Jest + SuperTest ───────────────────────────────────────────
  tests:
    name: Tests Jest + SuperTest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Ejecutar tests con cobertura
        run: npm test

      - name: Guardar cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ── 2. SonarQube ──────────────────────────────────────────────────
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Generar cobertura para SonarQube
        run: npm test

      - name: Análisis SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://34.51.19.162:9000

  # ── 3. K6 Load Test ───────────────────────────────────────────────
  k6:
    name: K6 Load Test
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Instalar dependencias y levantar app
        run: |
          npm install --legacy-peer-deps
          node src/server.js &
          sleep 5

      - name: Ejecutar K6
        run: k6 run --env BASE_URL=http://localhost:3000 k6/load-test.js

  # ── 4. Docker Build + Push a GHCR ────────────────────────────────
  docker:
    name: Docker + GHCR
    runs-on: ubuntu-latest
    needs: [sonarqube, k6]
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Crear Dockerfile en pipeline
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:18-alpine
          WORKDIR /usr/src/app
          COPY package*.json ./
          RUN npm install --legacy-peer-deps --omit=dev
          COPY . .
          EXPOSE 3000
          CMD ["node", "src/server.js"]
          EOF

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── 5. Deploy Blue-Green ──────────────────────────────────────────
  deploy:
    name: Deploy Blue-Green
    runs-on: ubuntu-latest
    needs: docker
    outputs:
      target: ${{ steps.state.outputs.target }}
      target_port: ${{ steps.state.outputs.target_port }}
      active: ${{ steps.state.outputs.active }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH con bastion
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -H "${{ secrets.BASTION_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host bastion\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n\nHost 10.0.*.*\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  IdentitiesOnly yes\n  ProxyJump bastion\n  StrictHostKeyChecking no\n' \
            "${{ secrets.BASTION_IP }}" \
            "${{ secrets.GCP_USER }}" \
            "${{ secrets.GCP_USER }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Leer estado actual blue/green
        id: state
        run: |
          ACTIVE=$(ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "cat ~/current_deploy.env 2>/dev/null | grep ACTIVE | cut -d'=' -f2 || echo 'blue'")
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          if [ "$ACTIVE" = "blue" ]; then
            echo "target=green"      >> $GITHUB_OUTPUT
            echo "target_port=3001"  >> $GITHUB_OUTPUT
          else
            echo "target=blue"       >> $GITHUB_OUTPUT
            echo "target_port=3000"  >> $GITHUB_OUTPUT
          fi

      - name: Autenticar docker-bryan en GHCR
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Desplegar contenedor en target
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} << EOF
          set -e
          TARGET=${{ steps.state.outputs.target }}
          PORT=${{ steps.state.outputs.target_port }}
          IMAGE=ghcr.io/${{ github.repository }}:latest
          docker pull \$IMAGE
          docker stop app-\$TARGET 2>/dev/null || true
          docker rm   app-\$TARGET 2>/dev/null || true
          docker run -d \
            --name app-\$TARGET \
            --restart unless-stopped \
            -p \$PORT:3000 \
            -e NODE_ENV=production \
            -e APP_ENV=\$TARGET \
            \$IMAGE
          echo "app-\$TARGET corriendo en puerto \$PORT"
          EOF

      - name: Health check
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "for i in \$(seq 1 20); do
               curl -fsS http://localhost:${{ steps.state.outputs.target_port }}/health && exit 0
               echo 'Intento '\$i' fallido, esperando 5s...'
               sleep 5
             done
             exit 1"

      - name: Guardar nuevo estado
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.DOCKER_VM_IP }} \
            "echo 'ACTIVE=${{ steps.state.outputs.target }}' > ~/current_deploy.env"

  # ── 6. Actualizar Nginx con envsubst ─────────────────────────────
  nginx:
    name: Actualizar Nginx con envsubst
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH con bastion
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -H "${{ secrets.BASTION_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host bastion\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n\nHost 10.0.*.*\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  IdentitiesOnly yes\n  ProxyJump bastion\n  StrictHostKeyChecking no\n' \
            "${{ secrets.BASTION_IP }}" \
            "${{ secrets.GCP_USER }}" \
            "${{ secrets.GCP_USER }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Generar config Nginx con envsubst y recargar
        run: |
          DEPLOY_COLOR=${{ needs.deploy.outputs.target }}
          TARGET_PORT=${{ needs.deploy.outputs.target_port }}
          DOCKER_IP=${{ secrets.DOCKER_VM_IP }}

          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=${{ secrets.GCP_USER }}@${{ secrets.BASTION_IP }} \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.GCP_USER }}@${{ secrets.NGINX_VM_IP }} \
            "export DEPLOY_COLOR=${DEPLOY_COLOR}
             export TARGET_PORT=${TARGET_PORT}
             export DOCKER_VM_IP=${DOCKER_IP}
             cat > /tmp/app.conf.template << 'TMPL'
          upstream app_backend {
              server \${DOCKER_VM_IP}:\${TARGET_PORT};
          }
          server {
              listen 80;
              location / {
                  proxy_pass         http://app_backend;
                  proxy_set_header   Host \$host;
                  proxy_set_header   X-Real-IP \$remote_addr;
                  add_header         X-Deployment-Color \${DEPLOY_COLOR};
              }
              location /metrics {
                  proxy_pass http://app_backend/metrics;
              }
          }
          TMPL
             envsubst '\${DOCKER_VM_IP} \${TARGET_PORT} \${DEPLOY_COLOR}' \
               < /tmp/app.conf.template \
               | sudo tee /etc/nginx/sites-available/app.conf > /dev/null
             sudo ln -sf /etc/nginx/sites-available/app.conf /etc/nginx/sites-enabled/app.conf
             sudo nginx -t && sudo systemctl reload nginx
             echo 'Nginx apuntando a ${DEPLOY_COLOR} en puerto ${TARGET_PORT}'"

      - name: Resumen del deploy
        run: |
          echo "========================================"
          echo " DEPLOY COMPLETADO"
          echo " Anterior : ${{ needs.deploy.outputs.active }}"
          echo " Activo   : ${{ needs.deploy.outputs.target }}"
          echo " Puerto   : ${{ needs.deploy.outputs.target_port }}"
          echo "========================================"